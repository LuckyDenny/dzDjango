<!doctype html>
<html lang="uk">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Регістрація — LuckyDenny</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.1/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
      html, body { height: 100%; }
      body { display: flex; align-items: center; padding-top: 40px; padding-bottom: 40px; background-color: #f5f5f5; }
      .form-signin { max-width: 330px; padding: 15px; }
      .form-signin .form-floating:focus-within { z-index: 2; }
      .form-signin input[type="email"] { margin-bottom: -1px; border-bottom-right-radius: 0; border-bottom-left-radius: 0; }
      .form-signin input[type="password"] { margin-bottom: 10px; border-top-left-radius: 0; border-top-right-radius: 0; }
    </style>
</head>
<body class="text-center">

<main class="form-signin w-100 m-auto">
  <form>
    <h1 class="h3 mb-3 fw-normal">Будь ласка, зарегіструйтесь</h1>

    <div class="form-floating">
      <input type="email" class="form-control" id="floatingInput" placeholder="name@example.com">
      <label for="floatingInput">Email адреса</label>
    </div>
    <div class="form-floating">
      <input type="password" class="form-control" id="floatingPassword" placeholder="Пароль">
      <label for="floatingPassword">Пароль</label>
    </div>

    <div class="checkbox mb-3">
      <label>
        <input type="checkbox" value="remember-me"> Запам'ятати мене
      </label>
    </div>
    <button class="w-100 btn btn-lg btn-primary" type="submit">Зарегіструватися</button>
    <a href="/index/" class="mt-3 d-block text-muted">На головну</a>
    <p class="mt-5 mb-3 text-muted">&copy; 2026 LuckyDenny</p>
  </form>
</main>

</body>
</html>
